<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Насти 🤍</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }
        .container { 
            border: 1px solid #333; 
            padding: 30px; 
            border-radius: 20px; 
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(10px);
            max-width: 350px;
            z-index: 10;
        }
        .photo {
            width: 100%;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
            border: 1px solid #444;
        }
        .btn {
            background: white;
            color: black;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.4); }
        
        .heart {
            position: absolute;
            color: white;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            animation: move 3s linear forwards;
        }
        @keyframes move {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="box">
        <h1 id="main-title" style="font-size: 40px; margin: 0;">24.03.2026</h1>
        <p id="desc">Насть, этот день начинается здесь...</p>
        <img id="pic" class="photo" src="">
        <div class="btn" id="action-btn" onclick="next()">Начать сюрприз</div>
    </div>

    <script>
        let step = 0;
        // СЮДА ВСТАВИШЬ СВОИ ССЫЛКИ ПОТОМ
        const content = [
            { t: "С днём рождения! ✨", p: "1.jpg" },
            { t: "Ты очень искренняя, оставайся такой же 🤍", p: "2.jpg" },
            { t: "Пусть этот год будет самым крутым!", p: "3.jpg" }
        ];
        function next() {
            createHearts();
            if (step < content.length) {
                document.getElementById('main-title').style.fontSize = '24px';
                document.getElementById('main-title').innerText = "Для тебя";
                document.getElementById('desc').innerText = content[step].t;
                const img = document.getElementById('pic');
                img.src = content[step].p;
                img.style.display = 'block';
                document.getElementById('action-btn').innerText = "Дальше";
                step++;
            } else {
                document.getElementById('desc').innerText = "Надеюсь, тебе понравилось! 😊";
                document.getElementById('pic').style.display = 'none';
                document.getElementById('action-btn').style.display = 'none';
            }
        }

        function createHearts() {
            for(let i=0; i<10; i++) {
                setTimeout(() => {
                    const h = document.createElement('div');
                    h.className = 'heart';
                    h.innerHTML = '🤍';
                    h.style.left = Math.random() * 100 + 'vw';
                    h.style.top = '100vh';
                    h.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(h);
                    setTimeout(() => h.remove(), 3000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
